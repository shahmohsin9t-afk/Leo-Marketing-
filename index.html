<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markhor AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1e1e1e;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #333;
            color: #00ffcc;
        }
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 18px;
            border-radius: 8px;
            max-width: 75%;
            line-height: 1.6;
        }
        .user {
            background-color: #0056b3;
            align-self: flex-start;
        }
        .bot {
            background-color: #2a2a2a;
            align-self: flex-end;
            border-left: 4px solid #00ffcc;
        }
        #input-container {
            display: flex;
            padding: 15px;
            background-color: #1e1e1e;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background-color: #00ffcc;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #00ccaa;
        }
    </style>
</head>
<body>

    <header>Markhor AI 🇵🇰</header>

    <div id="chat-container">
        <div class="message bot">اسلام علیکم! میں مارخور اے آئی ہوں۔ میں آپ کی کیا مدد کر سکتا ہوں؟</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="اپنا سوال یہاں لکھیں..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">بھیجیں</button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
